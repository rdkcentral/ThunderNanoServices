name: Build ThunderNanoServices on Linux

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  Thunder:
    uses: rdkcentral/Thunder/.github/workflows/Linux build template.yml@development/actions-tests

  ThunderInterfaces:
    needs: Thunder
    uses: rdkcentral/ThunderInterfaces/.github/workflows/Linux build template.yml@development/actions-tests

  ThunderNanoServices:
    needs: ThunderInterfaces
    uses: ./.github/workflows/Linux build template.yml
